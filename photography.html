<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography | Sushant Anand</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="index.css">
  <style>
    .coming-soon-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .coming-soon-title {
      font-size: 48px;
      font-family: var(--font-primary);
      background: linear-gradient(135deg, #ffffff 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .coming-soon-subtitle {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .btn-back {
      padding: 12px 30px;
      background: rgba(13, 17, 26, 0.7);
      border: 1px solid var(--accent-blue);
      color: var(--accent-blue);
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-back:hover {
      background: var(--accent-blue);
      color: #000;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
    }
  </style>
</head>
<body>

  <!-- Full-page glitter / floating particles -->
  <div id="glitter-bg" aria-hidden="true"></div>

  <!-- Background Accent Lights -->
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <main class="coming-soon-container">
    <h1 class="coming-soon-title">Photography <span style="font-size: 20px; vertical-align: top; color: var(--accent-green); -webkit-text-fill-color: var(--accent-green);">BETA</span></h1>
    <p class="coming-soon-subtitle">
      I'm currently curating a gallery of my favorite captures and visual stories. 
      The full photography portfolio will be launching here soon!
    </p>
    <a href="index.html" class="btn-back">← Back to Portfolio</a>
  </main>

  <script src="app.js"></script>
</body>
</html>
